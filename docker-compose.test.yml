# Заготовка test-контура (детально — Ш19). Изолирован от prod: свой проект, порт, data-dir.
# Запуск: docker compose -f docker-compose.test.yml -p volter-test up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: crates/control-plane/Dockerfile
    image: volter-api:test
    restart: unless-stopped
    environment:
      VOLTER_BIND: 0.0.0.0:8080
      VOLTER_DATA_DIR: /data
    volumes:
      - ./data/test:/data

  frontend:
    build: ./frontend
    image: volter-frontend:test
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${VOLTER_TEST_HTTP_PORT:-3001}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
