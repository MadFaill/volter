# Реверс-прокси фазы 1 (plan.md §11.2): один домен volter.comalert.pw.
# /api/ → control-plane backend; всё остальное → статика фронтенда. TLS терминируется
# вышестоящим прокси/Caddy (или добавляется сюда сертификатами).
server {
  listen 80;
  server_name volter.comalert.pw localhost _;

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
  }
}
