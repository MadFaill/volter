# Заготовка prod-контура (детально — Ш19). Ручной деплой, отдельный data-dir.
# Запуск: docker compose -f docker-compose.prod.yml -p volter-prod up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: crates/control-plane/Dockerfile
    image: volter-api:prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VOLTER_BIND: 0.0.0.0:8080
      VOLTER_DATA_DIR: /data
    volumes:
      - ./data/prod:/data

  frontend:
    build: ./frontend
    image: volter-frontend:prod
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${VOLTER_PROD_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
